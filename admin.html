<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bàn Điều Phối Quản Trò</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        :root { --bg-color: #0a192f; --bg-card: #112240; --text-main: #ccd6f6; --purple-tech: #b388ff; --cyan-tech: #64ffda; --alert-red: #ff6584; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-main); padding: 20px; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 550px; background: var(--bg-card); border-radius: 12px; padding: 25px; box-shadow: 0 10px 30px rgba(2,12,27,0.7); border: 1px solid #233554; }
        h2 { color: var(--purple-tech); text-align: center; margin-bottom: 20px; text-transform: uppercase; letter-spacing: 1px; }
        .panel-box { border: 1px solid #233554; padding: 15px; margin-bottom: 15px; border-radius: 8px; background: #0a192f; }
        .panel-title { font-weight: bold; color: var(--purple-tech); margin-bottom: 10px; font-size: 15px; }
        button { width: 100%; padding: 12px; background: transparent; border: 1px solid var(--purple-tech); color: var(--purple-tech); border-radius: 6px; font-weight: bold; cursor: pointer; margin-top: 5px; transition: 0.3s; }
        button:hover { background: rgba(179, 136, 255, 0.1); }
        .btn-start { border-color: var(--cyan-tech); color: var(--cyan-tech); margin-top: 15px;}
        .btn-start:hover { background: rgba(100, 255, 218, 0.1); }
        .player-item { display: flex; justify-content: space-between; align-items: center; padding: 8px; background: var(--bg-card); border: 1px solid #233554; margin-bottom: 6px; border-radius: 4px; font-size: 14px;}
        .btn-kick { width: auto; padding: 4px 8px; background: rgba(255,101,132,0.1); border: 1px solid var(--alert-red); color: var(--alert-red); margin: 0; font-size: 12px; }
        select, input { width: 100%; padding: 10px; background: var(--bg-card); border: 1px solid #233554; color: #fff; border-radius: 4px; margin-bottom: 10px; outline: none; }
        .setup-row { display: flex; gap: 10px; margin-bottom: 10px; }
    </style>
</head>
<body>
<div class="container">
    <h2>BÀN ĐIỀU PHỐI GAME</h2>
    
    <div class="panel-box">
        <div class="panel-title">👥 SƠ ĐỒ NHÂN SỰ TOÀN PHÒNG REALTIME (<span id="count">0</span>)</div>
        <div id="player-list" style="max-height: 250px; overflow-y: auto; margin-bottom: 10px;"></div>
    </div>

    <div class="panel-box">
        <div class="panel-title">⚔️ CẤU HÌNH BAN PHÁT VAI TRÒ</div>
        <p style="font-size: 13px; color: var(--cyan-tech); margin-bottom: 5px;">• Chỉ định Sát thủ 1:</p>
        <div class="setup-row">
            <select id="as1-select" class="as-selector"><option value="">-- Chọn Sát Thủ 1 --</option></select>
            <input type="text" id="as1-clue" placeholder="Nhập gợi ý cho Sát thủ 1...">
        </div>
        <p style="font-size: 13px; color: var(--cyan-tech); margin-bottom: 5px;">• Chỉ định Sát thủ 2:</p>
        <div class="setup-row">
            <select id="as2-select" class="as-selector"><option value="">-- Chọn Sát Thủ 2 --</option></select>
            <input type="text" id="as2-clue" placeholder="Nhập gợi ý cho Sát thủ 2...">
        </div>
        <p style="font-size: 13px; color: var(--cyan-tech); margin-bottom: 5px;">• Chỉ định Sát thủ 3:</p>
        <div class="setup-row">
            <select id="as3-select" class="as-selector"><option value="">-- Chọn Sát Thủ 3 --</option></select>
            <input type="text" id="as3-clue" placeholder="Nhập gợi ý cho Sát thủ 3...">
        </div>
        <button class="btn-start" onclick="submitAssignedRoles()">OK - XÁC NHẬN PHÁT VAI TRÒ</button>
    </div>

    <div class="panel-box">
        <div class="panel-title">📝 KHO CÂU HỎI THIẾT LẬP SẴN (60 GIÂY)</div>
        <div id="admin-timer" style="display:none; text-align: center; font-weight: bold; color: var(--cyan-tech); margin-bottom: 10px;">⏳ THỜI GIAN TRẢ LỜI CÒN LẠI: 60s</div>
        <select id="question-selector" onchange="loadPresetQuestion()">
            <option value="">-- Chọn câu hỏi nhanh --</option>
            <optgroup label="VÒNG 1: Trắc nghiệm ABCD">
                <option value="v1_1">V1 - Sản phẩm chủ lực bán chạy nhất quý trước là gì?</option>
                <option value="v1_2">V1 - KPI viếng thăm khách hàng (MCP) tối thiểu là bao nhiêu %?</option>
            </optgroup>
            <optgroup label="VÒNG 2: Tự luận (Nhập từ)">
                <option value="v2_1">V2 - Điền từ: Khách hàng là ... của doanh nghiệp</option>
                <option value="v2_2">V2 - Tên viết tắt của bộ phận Quản lý Hệ thống IT là gì?</option>
            </optgroup>
            <optgroup label="VÒNG 3: Trắc nghiệm ABCD tăng tốc">
                <option value="v3_1">V3 - Chiến dịch bùng nổ doanh số tới đây diễn ra vào tháng mấy?</option>
            </optgroup>
        </select>
        <input type="text" id="display-q" placeholder="Nội dung câu hỏi..." readonly>
        <input type="text" id="display-a" placeholder="Đáp án đúng..." readonly>
        <button onclick="triggerMinigame()">🔥 TUNG CÂU HỎI XUỐNG ĐIỆN THOẠI</button>
        <button style="border-color: var(--alert-red); color: var(--alert-red); display:none;" id="btn-stop-q" onclick="forceEndMinigame()">⏹ KHÓA SỔ CÂU HỎI SỚM</button>
    </div>

    <div class="panel-box">
        <div class="panel-title">🗳️ ĐIỀU HÀNH BỎ PHIẾU NGHI PHẠM (60 GIÂY)</div>
        <div id="admin-vote-timer" style="display:none; text-align: center; font-weight: bold; color: var(--alert-red); margin-bottom: 10px;">⏳ CỔNG VOTE ĐANG MỞ: 60s</div>
        <button onclick="openVoteRound()">MỞ CỔNG VOTE (TỰ ĐỘNG KHÓA SAU 60S)</button>
        <button style="border-color: var(--alert-red); color: var(--alert-red); display:none;" id="btn-stop-v" onclick="forceEndVote()">⏹ KHÓA CỔNG BỎ PHIẾU SỚM</button>
    </div>
</div>

<script>
    const socket = io();
    let currentQData = null;
    let adminTimerInterval = null;

    const presets = {
        v1_1: { type: "CHOICE", q: "Sản phẩm chủ lực bán chạy nhất quý trước là gì?", a: "A", options: ["A. Sữa tươi tiệt trùng", "B. Nước mắm cốt", "C. Mì ăn liền", "D. Bánh ngọt"] },
        v1_2: { type: "CHOICE", q: "KPI viếng thăm khách hàng (MCP) chuẩn quy định tối thiểu bao nhiêu %?", a: "C", options: ["A. 70%", "B. 75%", "C. 80%", "D. 85%"] },
        v2_1: { type: "TEXT", q: "Điền từ: Khách hàng là ________ của doanh nghiệp (viết liền không dấu)", a: "thuongde" },
        v2_2: { type: "TEXT", q: "Tên viết tắt của bộ phận Hệ thống Quản trị Kênh Phân Phối Sales là gì?", a: "dms" },
        v3_1: { type: "CHOICE", q: "Chiến dịch bùng nổ doanh số toàn quốc sắp tới sẽ diễn ra vào tháng mấy?", a: "B", options: ["A. Tháng 7", "B. Tháng 8", "C. Tháng 9", "D. Tháng 10"] }
    };

    function loadPresetQuestion() {
        const id = document.getElementById('question-selector').value;
        if(!id) return;
        currentQData = presets[id];
        document.getElementById('display-q').value = currentQData.q;
        document.getElementById('display-a').value = `Đáp án đúng: ${currentQData.a.toUpperCase()}`;
    }

    socket.on('update_player_list', (list) => {
        document.getElementById('count').innerText = list.length;
        
        const container = document.getElementById('player-list');
        container.innerHTML = list.map((p, index) => {
            let roleText = p.role === 'PENDING' ? 'Chưa phân vai' : p.role === 'ASSASSIN' ? 'Sát thủ 🩸' : 'Cảnh sát 🛡️';
            let clueDetailHTML = (p.role === 'ASSASSIN' && p.clue) ? `<br><span style="color:var(--alert-red); font-size:12px;">↳ Gợi ý: "${p.clue}" [Cướp thêm: ${p.stolenVotes} phiếu]</span>` : '';
            
            return `
                <div class="player-item">
                    <div>
                        <span><b>${index + 1}. ${p.name}</b> <small style="color:#8892b0;">(${roleText})</small></span>
                        ${clueDetailHTML}
                    </div>
                    <div style="display:flex; gap:8px; align-items:center;">
                        <span style="font-weight:bold; font-size:12px; color:${p.isAlive ? '#64ffda' : '#ff6584'}">${p.isAlive ? 'SỐNG' : 'CHẾT'}</span>
                        <button class="btn-kick" onclick="kickPlayer('${p.id}')">Đuổi</button>
                    </div>
                </div>
            `;
        }).join('');

        const selectors = document.querySelectorAll('.as-selector');
        selectors.forEach(sel => {
            const currentVal = sel.value;
            sel.innerHTML = `<option value="">-- Chọn Nhân Sự --</option>` + list.filter(p => p.isAlive).map(p => `
                <option value="${p.id}">${p.name}</option>
            `).join('');
            sel.value = currentVal;
        });
    });

    function kickPlayer(socketId) { if(confirm("Xóa người chơi?")) { socket.emit('kick_player_by_admin', socketId); } }

    function submitAssignedRoles() {
        const id1 = document.getElementById('as1-select').value;
        const clue1 = document.getElementById('as1-clue').value;
        const id2 = document.getElementById('as2-select').value;
        const clue2 = document.getElementById('as2-clue').value;
        const id3 = document.getElementById('as3-select').value;
        const clue3 = document.getElementById('as3-clue').value;

        if(!id1 && !id2 && !id3) return alert("Vui lòng chỉ định ít nhất 1 Sát thủ!");

        socket.emit('admin_assign_roles', {
            assassins: [
                { id: id1, clue: clue1 },
                { id: id2, clue: clue2 },
                { id: id3, clue: clue3 }
            ]
        });
        alert("Đã gửi danh tính cài đặt toàn phòng thành công!");
    }
    
    function triggerMinigame() {
        if(!currentQData) return alert("Vui lòng lựa chọn câu hỏi mẫu trước!");
        socket.emit('host_trigger_minigame', { id: Date.now(), type: currentQData.type, question: currentQData.q, correctAnswer: currentQData.a, options: currentQData.options || [] });
        
        if(adminTimerInterval) clearInterval(adminTimerInterval);
        document.getElementById('btn-stop-q').style.display = 'block';
        const timerBox = document.getElementById('admin-timer');
        timerBox.style.display = 'block';
        let timeLeft = 60;

        adminTimerInterval = setInterval(() => {
            timeLeft--;
            timerBox.innerText = `⏳ THỜI GIAN TRẢ LỜI CÒN LẠI: ${timeLeft}s`;
            if(timeLeft <= 0) { clearInterval(adminTimerInterval); timerBox.style.display = 'none'; document.getElementById('btn-stop-q').style.display = 'none';}
        }, 1000);
    }

    function forceEndMinigame() { socket.emit('admin_force_end_minigame'); }

    function openVoteRound() {
        socket.emit('admin_open_vote_round');
        if(adminTimerInterval) clearInterval(adminTimerInterval);
        document.getElementById('btn-stop-v').style.display = 'block';
        const voteTimerBox = document.getElementById('admin-vote-timer');
        voteTimerBox.style.display = 'block';
        let voteTimeLeft = 60;

        adminTimerInterval = setInterval(() => {
            voteTimeLeft--;
            voteTimerBox.innerText = `⏳ CỔNG VOTE ĐANG MỞ: ${voteTimeLeft}s`;
            if(voteTimeLeft <= 0) { clearInterval(adminTimerInterval); voteTimerBox.style.display = 'none'; document.getElementById('btn-stop-v').style.display = 'none';}
        }, 1000);
    }

    function forceEndVote() { socket.emit('admin_force_end_vote'); }

    socket.on('minigame_ended', (winners) => {
        if(adminTimerInterval) clearInterval(adminTimerInterval);
        document.getElementById('admin-timer').style.display = 'none';
        document.getElementById('btn-stop-q').style.display = 'none';
        alert(`CÂU HỎI KẾT THÚC!\n🏆 Top 3 nhanh nhất: ${winners.length > 0 ? winners.join(', ') : 'Không ai nộp bài kịp!'}`);
    });

    socket.on('player_died', (data) => alert(`HỆ THỐNG: Mật vụ [ ${data.victimName} ] đã trúng độc tử trận!`));
    
    socket.on('vote_result_announced', (data) => {
        if(adminTimerInterval) clearInterval(adminTimerInterval);
        document.getElementById('admin-vote-timer').style.display = 'none';
        document.getElementById('btn-stop-v').style.display = 'none';
        alert(`KẾT QUẢ VOTE ROUND:\nTop 5 nghi phạm: ${data.top5Names.join(', ')}\n-> QUÉT HỆ THỐNG: ${data.hasAssassin ? 'CÓ SÁT THỦ TRONG TOP 5! 🩸' : 'AN TOÀN, KHÔNG CÓ SÁT THỦ. 🛡️'}`);
    });
</script>
</body>
</html>
